{% extends 'core/base.html' %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block contenido %}
<div class="row justify-content-center mt-5 animate__animated animate__fadeInUp">
    <div class="col-md-6 col-lg-5">
        <div class="card card-pro border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-header bg-white border-bottom text-center py-4">
                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                    <i class="bi bi-envelope-paper-fill fs-2"></i>
                </div>
                <h4 class="fw-bold text-dark mb-1">Recuperar Contraseña</h4>
                <p class="text-muted small mb-0 px-3">Ingresa el correo electrónico asociado a tu cuenta y te enviaremos las instrucciones.</p>
            </div>
            
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold text-uppercase">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control form-control-lg bg-light border-secondary-subtle" placeholder="ejemplo@correo.com" required id="id_email">
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark btn-lg fw-bold rounded-pill shadow-sm">
                            <i class="bi bi-send-fill me-2"></i> Enviar Enlace
                        </button>
                        <a href="{% url 'login' %}" class="btn btn-light text-muted fw-bold rounded-pill mt-2">
                            Volver al Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
